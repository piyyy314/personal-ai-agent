name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile monitoring.py
          python -m py_compile health_server.py
          python -m py_compile create_zip.py

      - name: Verify .env.example has no real secrets
        run: |
          # Fail if any real-looking API key pattern appears in .env.example
          ! grep -E 'sk-[A-Za-z0-9]{20,}' .env.example
