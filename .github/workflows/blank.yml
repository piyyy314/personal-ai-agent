name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pyflakes
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style issues
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics --exclude=.venv,venv

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile monitoring.py
          python -m py_compile health_server.py
          python -m py_compile create_zip.py

      - name: Verify .env.example has no real secrets
        run: |
          # Fail if any real-looking API key pattern appears in .env.example
          ! grep -E 'sk-[A-Za-z0-9]{20,}' .env.example
