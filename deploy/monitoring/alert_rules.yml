groups:
  - name: agent.rules
    rules:
      - alert: AgentUnavailable
        expr: up{job="agent"} == 0 or agent_session_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent unavailable or unhealthy"
          description: "The agent is down or reporting an unhealthy session status."

      - alert: HighErrorRate
        expr: (sum(rate(agent_requests_total{status="error"}[5m])) / sum(rate(agent_requests_total[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated agent error rate"
          description: "More than 5% of agent calls failed over the last 5 minutes."

      - alert: SlowResponsesP95
        expr: histogram_quantile(0.95, sum(rate(agent_request_latency_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency (P95 > 5s)"
          description: "The 95th percentile response time exceeded 5 seconds."

      - alert: SuspiciousAccessDetected
        expr: increase(agent_security_events_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Security anomaly detected"
          description: "Suspicious or unauthorized access pattern observed in the last 5 minutes."

  - name: system.rules
    rules:
      - alert: AgentContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_service="agent"}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Agent container high CPU usage"
          description: "Agent container CPU usage above 80% for 10 minutes."

      - alert: AgentContainerHighMemory
        expr: container_memory_usage_bytes{container_label_com_docker_compose_service="agent"} > 1073741824
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Agent container high memory usage"
          description: "Agent container memory usage above 1GiB."
