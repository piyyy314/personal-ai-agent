version: '3.8'

services:
  # Main AI Agent Application
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-ai-agent
    env_file:
      - .env
    environment:
      - HEALTH_PORT=8080
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    volumes:
      - agent-logs:/var/log/agent
      - ./data:/app/data
    networks:
      - agent-network
    depends_on:
      - prometheus
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    networks:
      - agent-network
    restart: unless-stopped

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - agent-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # AlertManager - Alert Management and Routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager:/etc/alertmanager
      - alertmanager-data:/alertmanager
    networks:
      - agent-network
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki:/etc/loki
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - agent-network
    restart: unless-stopped

  # Promtail - Log Shipper
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./deploy/promtail:/etc/promtail
      - agent-logs:/var/log/agent:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - agent-network
    depends_on:
      - loki
    restart: unless-stopped

networks:
  agent-network:
    driver: bridge

volumes:
  agent-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
